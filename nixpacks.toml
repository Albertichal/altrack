[phases.setup]
nixPkgs = ["php83", "php83Extensions.pdo", "php83Extensions.pdo_mysql", "php83Extensions.mbstring", "php83Extensions.tokenizer", "php83Extensions.xml", "php83Extensions.openssl", "php83Extensions.bcmath", "php83Extensions.fileinfo", "php83Extensions.curl", "composer"]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist"]

[phases.build]
cmds = ["php artisan config:clear", "php artisan route:clear", "php artisan view:clear"]

[start]
cmd = "sh -c 'php artisan config:cache; php artisan route:cache; php artisan view:cache; php artisan serve --host=0.0.0.0 --port=$PORT'"